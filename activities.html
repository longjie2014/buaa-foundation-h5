<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>校友活动 - 北航教育基金会</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@4/lib/index.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <van-nav-bar title="校友活动" left-arrow @click-left="goBack" fixed placeholder></van-nav-bar>
        
        <van-tabs v-model="activeTab" sticky offset-top="46">
            <van-tab title="全部活动">
                <activity-list :activities="allActivities"></activity-list>
            </van-tab>
            <van-tab title="报名中">
                <activity-list :activities="openActivities"></activity-list>
            </van-tab>
            <van-tab title="进行中">
                <activity-list :activities="ongoingActivities"></activity-list>
            </van-tab>
            <van-tab title="已结束">
                <activity-list :activities="endedActivities"></activity-list>
            </van-tab>
        </van-tabs>
    </div>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <script>
        const { createApp, defineComponent } = Vue;
        
        const ActivityList = defineComponent({
            props: ['activities'],
            template: `
                <div class="activity-list">
                    <div v-for="activity in activities" :key="activity.id" class="activity-card" @click="viewDetail(activity.id)">
                        <van-image :src="activity.image" fit="cover" class="activity-img"></van-image>
                        <div class="activity-info">
                            <div class="activity-status" :class="activity.status">{{ activity.statusText }}</div>
                            <h3>{{ activity.title }}</h3>
                            <div class="activity-meta">
                                <span><van-icon name="clock-o"></van-icon> {{ activity.time }}</span>
                                <span><van-icon name="location-o"></van-icon> {{ activity.location }}</span>
                            </div>
                            <div class="activity-footer">
                                <span class="participants">{{ activity.joined }}人已报名</span>
                                <van-button v-if="activity.status === 'open'" type="primary" size="small" round>立即报名</van-button>
                                <van-button v-else disabled size="small" round>{{ activity.statusText }}</van-button>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            methods: {
                viewDetail(id) {
                    location.href = `activity-detail.html?id=${id}`;
                }
            }
        });
        
        createApp({
            components: { ActivityList },
            data() {
                return {
                    activeTab: 0,
                    allActivities: [
                        { id: 1, title: "2026年校友新春联谊会", time: "2026-02-15 14:00", location: "北航晨兴音乐厅", joined: 128, status: "open", statusText: "报名中", image: "https://picsum.photos/400/200?random=1" },
                        { id: 2, title: "校友企业专场招聘会", time: "2026-03-20 09:00", location: "北航体育馆", joined: 256, status: "open", statusText: "报名中", image: "https://picsum.photos/400/200?random=2" },
                        { id: 3, title: "毕业十周年返校活动", time: "2026-04-10 10:00", location: "北航校园", joined: 88, status: "open", statusText: "报名中", image: "https://picsum.photos/400/200?random=3" },
                        { id: 4, title: "校友创新创业论坛", time: "2026-01-15 14:00", location: "北航新主楼报告厅", joined: 200, status: "ongoing", statusText: "进行中", image: "https://picsum.photos/400/200?random=4" },
                        { id: 5, title: "2025年校友年会", time: "2025-12-20 14:00", location: "北航学术交流厅", joined: 500, status: "ended", statusText: "已结束", image: "https://picsum.photos/400/200?random=5" }
                    ],
                    openActivities: [],
                    ongoingActivities: [],
                    endedActivities: []
                };
            },
            created() {
                this.openActivities = this.allActivities.filter(a => a.status === 'open');
                this.ongoingActivities = this.allActivities.filter(a => a.status === 'ongoing');
                this.endedActivities = this.allActivities.filter(a => a.status === 'ended');
            },
            methods: {
                goBack() {
                    location.href = 'index.html';
                }
            }
        }).use(vant).component('ActivityList', ActivityList).mount('#app');
    </script>
</body>
</html>
