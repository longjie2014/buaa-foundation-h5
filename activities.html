<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>校友活动 - 北航教育基金会</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/npm/vant@4/lib/index.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/activities.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div id="app">
        <van-nav-bar title="校友活动" left-arrow @click-left="goBack" fixed placeholder></van-nav-bar>
        
        <!-- 项目介绍 -->
        <div class="project-intro" style="margin-top: 46px;">
            <div class="project-header">
                <img src="https://picsum.photos/100/100?random=100" class="project-logo" alt="项目logo">
                <div class="project-title">
                    <h2>北航校友活动平台</h2>
                    <p>汇聚校友力量，传承北航精神</p>
                </div>
            </div>
            <p class="project-desc">
                为促进校友之间的交流与合作，北航教育基金会定期举办各类校友活动，包括校友返校日、行业论坛、企业参访、文体活动等，旨在搭建校友互动平台，助力校友事业发展。
            </p>
        </div>
        
        <!-- 标签切换 -->
        <van-tabs v-model="activeTab" sticky offset-top="46">
            <van-tab title="活动报名">
                <div class="activity-list">
                    <div v-for="activity in allActivities" :key="activity.id" class="activity-item" @click="viewActivity(activity.id)">
                        <img :src="activity.image" class="activity-thumb" alt="活动图片">
                        <div class="activity-content">
                            <h3>{{ activity.title }}</h3>
                            <div class="activity-time">{{ activity.time }}</div>
                            <span class="activity-status-tag" :class="activity.status">{{ activity.statusText }}</span>
                        </div>
                    </div>
                </div>
            </van-tab>
            <van-tab title="活动照片">
                <van-empty description="暂无活动照片"></van-empty>
            </van-tab>
        </van-tabs>

        <!-- 底部 Tabbar -->
        <van-tabbar v-model="activeTabBar" fixed placeholder>
            <van-tabbar-item icon="home-o" @click="goPage('index')">首页</van-tabbar-item>
            <van-tabbar-item icon="shop-o" @click="goPage('store')">文创</van-tabbar-item>
            <van-tabbar-item icon="calendar-o" @click="goPage('activities')">活动</van-tabbar-item>
            <van-tabbar-item icon="user-o" @click="goPage('my')">我的</van-tabbar-item>
        </van-tabbar>
    </div>
    
    <script src="https://cdn.bootcdn.net/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.bootcdn.net/npm/vant@4/lib/vant.min.js"></script>
    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    activeTab: 0,
                    activeTabBar: 2,
                    allActivities: [
                        { id: 1, title: "2026年校友新春联谊会", time: "2026-02-15 14:00", location: "北航晨兴音乐厅", joined: 128, status: "open", statusText: "报名中", image: "https://picsum.photos/200/200?random=1" },
                        { id: 2, title: "校友企业专场招聘会", time: "2026-03-20 09:00", location: "北航体育馆", joined: 256, status: "open", statusText: "报名中", image: "https://picsum.photos/200/200?random=2" },
                        { id: 3, title: "毕业十周年返校活动", time: "2026-04-10 10:00", location: "北航校园", joined: 88, status: "open", statusText: "报名中", image: "https://picsum.photos/200/200?random=3" },
                        { id: 4, title: "校友创新创业论坛", time: "2026-01-15 14:00", location: "北航新主楼报告厅", joined: 200, status: "ongoing", statusText: "进行中", image: "https://picsum.photos/200/200?random=4" },
                        { id: 5, title: "2025年校友年会", time: "2025-12-20 14:00", location: "北航学术交流厅", joined: 500, status: "closed", statusText: "已结束", image: "https://picsum.photos/200/200?random=5" }
                    ]
                };
            },
            methods: {
                goBack() {
                    location.href = 'index.html';
                },
                viewActivity(id) {
                    location.href = `activity-detail.html?id=${id}`;
                },
                goPage(page) {
                    const pageMap = {
                        'index': 'index.html',
                        'store': 'store.html',
                        'activities': 'activities.html',
                        'my': 'my.html'
                    };
                    const target = pageMap[page];
                    if (target) {
                        window.location.href = target;
                    }
                }
            }
        }).use(vant).mount('#app');
    </script>
</body>
</html>
