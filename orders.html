<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的订单 - 北航教育基金会</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@4/lib/index.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <van-nav-bar title="我的订单" left-arrow @click-left="goBack" fixed placeholder></van-nav-bar>
        
        <van-tabs v-model="activeTab" sticky offset-top="46">
            <van-tab title="全部" :badge="orders.length">
                <order-list :orders="orders"></order-list>
            </van-tab>
            <van-tab title="待付款">
                <order-list :orders="pendingOrders"></order-list>
            </van-tab>
            <van-tab title="待发货" :badge="2">
                <order-list :orders="paidOrders"></order-list>
            </van-tab>
            <van-tab title="待收货" :badge="1">
                <order-list :orders="shippedOrders"></order-list>
            </van-tab>
            <van-tab title="已完成">
                <order-list :orders="completedOrders"></order-list>
            </van-tab>
        </van-tabs>
    </div>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <script>
        const { createApp, defineComponent } = Vue;
        
        const OrderList = defineComponent({
            props: ['orders'],
            template: `
                <div class="order-list">
                    <van-empty v-if="orders.length === 0" description="暂无订单"></van-empty>
                    
                    <van-card v-for="order in orders" :key="order.id" class="order-card">
                        <template #title>
                            <div class="order-header">
                                <span>订单号: {{ order.orderNo }}</span>
                                <van-tag :type="order.statusType">{{ order.status }}</van-tag>
                            </div>
                        </template>
                        
                        <template #thumb>
                            <van-image :src="order.image" fit="cover" width="80" height="80"></van-image>
                        </template>
                        
                        <template #desc>
                            <div class="order-product">
                                <h4>{{ order.productName }}</h4>
                                <p class="order-spec">{{ order.spec }}</p>
                                <div class="order-price-row">
                                    <span class="order-price">¥{{ order.price }}</span>
                                    <span class="order-count">x{{ order.count }}</span>
                                </div>
                            </div>
                        </template>
                        
                        <template #footer>
                            <div class="order-footer">
                                <div class="order-total">
                                    共{{ order.count }}件商品 合计: <span class="total-price">¥{{ order.total }}</span>
                                </div>
                                <div class="order-actions">
                                    <van-button v-if="order.status === '待付款'" type="danger" size="small" round>立即付款</van-button>
                                    <van-button v-if="order.status === '待收货'" type="primary" size="small" round plain>查看物流</van-button>
                                    <van-button v-if="order.status === '待收货'" type="primary" size="small" round>确认收货</van-button>
                                </div>
                            </div>
                        </template>
                    </van-card>
                </div>
            `
        });
        
        createApp({
            components: { OrderList },
            data() {
                return {
                    activeTab: 0,
                    orders: [
                        { id: 1, orderNo: "20260228001", productName: "北航纪念卫衣", spec: "蓝色 L", price: 168, count: 1, total: 168, status: "待收货", statusType: "warning", image: "https://picsum.photos/200/200?random=1" },
                        { id: 2, orderNo: "20260228002", productName: "北航马克杯", spec: "经典款", price: 58, count: 2, total: 116, status: "待发货", statusType: "primary", image: "https://picsum.photos/200/200?random=2" },
                        { id: 3, orderNo: "20260228003", productName: "北航帆布包", spec: "黑色", price: 88, count: 1, total: 88, status: "已完成", statusType: "success", image: "https://picsum.photos/200/200?random=3" },
                        { id: 4, orderNo: "20260228004", productName: "北航校徽胸针", spec: "金色", price: 28, count: 3, total: 84, status: "待付款", statusType: "danger", image: "https://picsum.photos/200/200?random=4" }
                    ],
                    pendingOrders: [],
                    paidOrders: [],
                    shippedOrders: [],
                    completedOrders: []
                };
            },
            created() {
                this.pendingOrders = this.orders.filter(o => o.status === '待付款');
                this.paidOrders = this.orders.filter(o => o.status === '待发货');
                this.shippedOrders = this.orders.filter(o => o.status === '待收货');
                this.completedOrders = this.orders.filter(o => o.status === '已完成');
            },
            methods: {
                goBack() {
                    history.back();
                }
            }
        }).use(vant).component('OrderList', OrderList).mount('#app');
    </script>
</body>
</html>
