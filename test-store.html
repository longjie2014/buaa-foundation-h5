<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文创商城 - 北航教育基金会</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
        
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #004098;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
        }
        
        .content {
            padding: 70px 20px 80px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .card h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: white;
            display: flex;
            border-top: 1px solid #eee;
            z-index: 100;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #999;
            font-size: 12px;
        }
        
        .nav-item.active {
            color: #004098;
        }
        
        .nav-icon {
            font-size: 24px;
            margin-bottom: 2px;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .product {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        
        .product-info {
            padding: 10px;
        }
        
        .product h4 {
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .price {
            color: #ff6b6b;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="nav-bar">文创商城</div>
    
    <div class="content">
        <div class="product-grid">
            <div class="product">
                <img src="https://picsum.photos/200/200?random=1" alt="卫衣">
                <div class="product-info">
                    <h4>北航纪念卫衣</h4>
                    <div class="price">¥168</div>
                </div>
            </div>
            
            <div class="product">
                <img src="https://picsum.photos/200/200?random=2" alt="马克杯">
                <div class="product-info">
                    <h4>北航马克杯</h4>
                    <div class="price">¥58</div>
                </div>
            </div>
            
            <div class="product">
                <img src="https://picsum.photos/200/200?random=3" alt="胸针">
                <div class="product-info">
                    <h4>北航校徽胸针</h4>
                    <div class="price">¥28</div>
                </div>
            </div>
            
            <div class="product">
                <img src="https://picsum.photos/200/200?random=4" alt="帆布包">
                <div class="product-info">
                    <h4>北航帆布包</h4>
                    <div class="price">¥88</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a href="test-nav.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="test-store.html" class="nav-item active">
            <span class="nav-icon">🛍️</span>
            <span>文创</span>
        </a>
        <a href="test-activities.html" class="nav-item">
            <span class="nav-icon">📅</span>
            <span>活动</span>
        </a>
        <a href="test-my.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>我的</span>
        </a>
    </div>
</body>
</html>
