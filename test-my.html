        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #004098;
            color: white;

            padding: 20px;
            color: white;
            margin-bottom: 15px;
        }
        
        .user-card h2 {

            margin-bottom: 5px;
        }

        .stats {

            padding-top: 20px;

        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-num {

            font-weight: bold;
            display: block;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .menu-list {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            text-decoration: none;
            color: #333;
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }
        
        .menu-icon {
            font-size: 20px;
            margin-right: 15px;
            width: 24px;
            text-align: center;
        }
        
        .menu-text {
            flex: 1;
            font-size: 15px;
        }
        
        .menu-arrow {
            color: #999;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: white;
            display: flex;
            border-top: 1px solid #eee;
            z-index: 100;

            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #999;
            font-size: 12px;
        }
        
        .nav-item.active {
