<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>捐赠项目详情 - 北航教育基金会</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@4/lib/index.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/project.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div id="app">
        <van-nav-bar title="项目详情" left-arrow @click-left="goBack" fixed placeholder></van-nav-bar>
        
        <van-image src="https://picsum.photos/400/200?random=1" fit="cover" class="detail-banner"></van-image>
        
        <div class="detail-content">
            <h1>{{ project.title }}</h1>
            <van-tag color="#004098">{{ project.category }}</van-tag>
            
            <div class="progress-section">
                <van-progress :percentage="project.progress" color="#004098" stroke-width="8"></van-progress>
                <div class="progress-stats">
                    <div>
                        <span class="label">已筹</span>
                        <span class="value">¥{{ project.raised }}</span>
                    </div>
                    <div>
                        <span class="label">目标</span>
                        <span class="value">¥{{ project.target }}</span>
                    </div>
                    <div>
                        <span class="label">捐赠人</span>
                        <span class="value">{{ project.donors }}人</span>
                    </div>
                </div>
            </div>
            
            <van-divider></van-divider>
            
            <div class="project-desc">
                <h3>项目介绍</h3>
                <p>{{ project.description }}</p>
                
                <h3>资金用途</h3>
                <van-cell-group>
                    <van-cell v-for="(item, index) in project.usage" :key="index" :title="item.name" :value="item.percent"></van-cell>
                </van-cell-group>
            </div>
            
            <van-divider></van-divider>
            
            <div class="donors-list">
                <h3>最新捐赠</h3>
                <van-cell v-for="donor in project.donorList" :key="donor.id" :title="donor.name" :label="donor.time" :value="'¥' + donor.amount"></van-cell>
            </div>
        </div>
        
        <div class="bottom-action">
            <van-button type="primary" block color="#004098" @click="donateNow">我要捐赠</van-button>
        </div>
        
        <!-- 底部 Tabbar -->
        <van-tabbar v-model="activeTabBar" fixed placeholder>
            <van-tabbar-item icon="home-o" @click="goPage('index')">首页</van-tabbar-item>
            <van-tabbar-item icon="shop-o" @click="goPage('store')">文创</van-tabbar-item>
            <van-tabbar-item icon="calendar-o" @click="goPage('activities')">活动</van-tabbar-item>
            <van-tabbar-item icon="user-o" @click="goPage('my')">我的</van-tabbar-item>
        </van-tabbar>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    activeTabBar: 0,
                    project: {
                        title: "北航发展基金",
                        category: "学校发展",
                        raised: "1,285,000",
                        target: "2,000,000",
                        progress: 64,
                        donors: 256,
                        description: "北航发展基金用于支持学校各项事业发展，包括基础设施建设、教学科研设备购置、人才引进培养等方面。您的每一份捐赠都将为北航的发展贡献力量，帮助学校建设世界一流大学。",
                        usage: [
                            { name: "基础设施建设", percent: "40%" },
                            { name: "教学科研设备", percent: "30%" },
                            { name: "人才培养", percent: "20%" },
                            { name: "其他", percent: "10%" }
                        ],
                        donorList: [
                            { id: 1, name: "张**", amount: "10,000", time: "2026-02-28" },
                            { id: 2, name: "李**", amount: "5,000", time: "2026-02-27" },
                            { id: 3, name: "王**", amount: "2,000", time: "2026-02-26" },
                            { id: 4, name: "刘**", amount: "1,000", time: "2026-02-25" },
                            { id: 5, name: "陈**", amount: "500", time: "2026-02-24" }
                        ]
                    }
                };
            },
            methods: {
                goBack() {
                    history.back();
                },
                donateNow() {
                    vant.Dialog.confirm({
                        title: '确认捐赠',
                        message: '您确定要向此项目捐赠吗？',
                    }).then(() => {
                        vant.Toast('感谢您的捐赠！');
                    }).catch(() => {
                        // 取消
                    });
                },
                goPage(page) {
                    const pageMap = {
                        'index': 'index.html',
                        'store': 'store.html',
                        'activities': 'activities.html',
                        'my': 'my.html'
                    };
                    const target = pageMap[page];
                    if (target) {
                        window.location.href = target;
                    }
                }
            }
        }).use(vant).mount('#app');
    </script>
</body>
</html>
