<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文创商城 - 北航教育基金会</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@4/lib/index.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <van-nav-bar title="文创商城" left-arrow @click-left="goBack" fixed placeholder>
            <template #right>
                <van-icon name="shopping-cart-o" size="20" badge="2" @click="goCart"></van-icon>
            </template>
        </van-nav-bar>
        
        <!-- 搜索栏 -->
        <div class="search-bar">
            <van-search v-model="searchValue" placeholder="搜索文创商品" shape="round" @search="onSearch"></van-search>
        </div>
        
        <!-- 分类标签 -->
        <van-tabs v-model="activeTab" sticky offset-top="46" @click-tab="onTabClick">
            <van-tab title="全部">
                <div class="store-grid">
                    <div v-for="product in allProducts" :key="product.id" class="store-item" @click="viewProduct(product.id)">
                        <van-image :src="product.image" fit="cover" class="store-img" />
                        <div class="store-info">
                            <h4>{{ product.name }}</h4>
                            <p class="store-price"><span class="currency">¥</span>{{ product.price }}</p>
                            <div class="store-tags">
                                <van-tag v-for="tag in product.tags" :key="tag" size="mini" type="primary" plain>{{ tag }}</van-tag>
                            </div>
                        </div>
                    </div>
                </div>
            </van-tab>
            <van-tab title="服饰">
                <div class="store-grid">
                    <div v-for="product in clothes" :key="product.id" class="store-item" @click="viewProduct(product.id)">
                        <van-image :src="product.image" fit="cover" class="store-img" />
                        <div class="store-info">
                            <h4>{{ product.name }}</h4>
                            <p class="store-price"><span class="currency">¥</span>{{ product.price }}</p>
                        </div>
                    </div>
                </div>
            </van-tab>
            <van-tab title="生活用品">
                <div class="store-grid">
                    <div v-for="product in daily" :key="product.id" class="store-item" @click="viewProduct(product.id)">
                        <van-image :src="product.image" fit="cover" class="store-img" />
                        <div class="store-info">
                            <h4>{{ product.name }}</h4>
                            <p class="store-price"><span class="currency">¥</span>{{ product.price }}</p>
                        </div>
                    </div>
                </div>
            </van-tab>
            <van-tab title="纪念品">
                <div class="store-grid">
                    <div v-for="product in souvenir" :key="product.id" class="store-item" @click="viewProduct(product.id)">
                        <van-image :src="product.image" fit="cover" class="store-img" />
                        <div class="store-info">
                            <h4>{{ product.name }}</h4>
                            <p class="store-price"><span class="currency">¥</span>{{ product.price }}</p>
                        </div>
                    </div>
                </div>
            </van-tab>
        </van-tabs>

        <!-- 底部 Tabbar -->
        <van-tabbar v-model="activeTabBar" fixed placeholder>
            <van-tabbar-item icon="home-o" @click="goPage('index')">首页</van-tabbar-item>
            <van-tabbar-item icon="shop-o" @click="goPage('store')">文创</van-tabbar-item>
            <van-tabbar-item icon="calendar-o" @click="goPage('activities')">活动</van-tabbar-item>
            <van-tabbar-item icon="user-o" @click="goPage('my')">我的</van-tabbar-item>
        </van-tabbar>
    </div>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    searchValue: '',
                    activeTab: 0,
                    activeTabBar: 1,
                    allProducts: [
                        { id: 1, name: "北航纪念卫衣", price: 168, tags: ["热销", "新品"], image: "https://picsum.photos/200/200?random=1" },
                        { id: 2, name: "北航马克杯", price: 58, tags: ["经典"], image: "https://picsum.photos/200/200?random=2" },
                        { id: 3, name: "北航校徽胸针", price: 28, tags: ["精致"], image: "https://picsum.photos/200/200?random=3" },
                        { id: 4, name: "北航帆布包", price: 88, tags: ["实用"], image: "https://picsum.photos/200/200?random=4" },
                        { id: 5, name: "北航纪念T恤", price: 98, tags: ["夏季"], image: "https://picsum.photos/200/200?random=5" },
                        { id: 6, name: "北航笔记本套装", price: 48, tags: ["文具"], image: "https://picsum.photos/200/200?random=6" },
                        { id: 7, name: "北航棒球帽", price: 68, tags: ["配饰"], image: "https://picsum.photos/200/200?random=7" },
                        { id: 8, name: "北航钥匙扣", price: 18, tags: ["小礼品"], image: "https://picsum.photos/200/200?random=8" }
                    ],
                    clothes: [
                        { id: 1, name: "北航纪念卫衣", price: 168, tags: ["热销"], image: "https://picsum.photos/200/200?random=1" },
                        { id: 5, name: "北航纪念T恤", price: 98, tags: ["夏季"], image: "https://picsum.photos/200/200?random=5" },
                        { id: 7, name: "北航棒球帽", price: 68, tags: ["配饰"], image: "https://picsum.photos/200/200?random=7" }
                    ],
                    daily: [
                        { id: 2, name: "北航马克杯", price: 58, tags: ["经典"], image: "https://picsum.photos/200/200?random=2" },
                        { id: 4, name: "北航帆布包", price: 88, tags: ["实用"], image: "https://picsum.photos/200/200?random=4" },
                        { id: 6, name: "北航笔记本套装", price: 48, tags: ["文具"], image: "https://picsum.photos/200/200?random=6" }
                    ],
                    souvenir: [
                        { id: 3, name: "北航校徽胸针", price: 28, tags: ["精致"], image: "https://picsum.photos/200/200?random=3" },
                        { id: 8, name: "北航钥匙扣", price: 18, tags: ["小礼品"], image: "https://picsum.photos/200/200?random=8" }
                    ]
                };
            },
            methods: {
                goBack() {
                    location.href = 'index.html';
                },
                goCart() {
                    vant.Toast('购物车功能开发中');
                },
                onSearch() {
                    vant.Toast(`搜索: ${this.searchValue}`);
                },
                onTabClick() {
                    console.log('Tab switched');
                },
                viewProduct(id) {
                    location.href = `product-detail.html?id=${id}`;
                },
                goPage(page) {
                    const pageMap = {
                        'index': 'index.html',
                        'store': 'store.html',
                        'activities': 'activities.html',
                        'my': 'my.html'
                    };
                    if (pageMap[page] && !location.href.includes(pageMap[page])) {
                        location.href = pageMap[page];
                    }
                }
            }
        }).use(vant).mount('#app');
    </script>
</body>
</html>
