<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文创商城 - 北航教育基金会</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@4/lib/index.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <van-nav-bar title="文创商城" left-arrow @click-left="goBack" fixed placeholder>
            <template #right>
                <van-icon name="shopping-cart-o" size="20" badge="2" @click="goCart"></van-icon>
            </template>
        </van-nav-bar>
        
        <!-- 搜索栏 -->
        <div class="search-bar">
            <van-search v-model="searchValue" placeholder="搜索文创商品" shape="round"></van-search>
        </div>
        
        <!-- 分类标签 -->
        <van-tabs v-model="activeTab" sticky offset-top="46">
            <van-tab title="全部">
                <product-list :products="allProducts"></product-list>
            </van-tab>
            <van-tab title="服饰">
                <product-list :products="clothes"></product-list>
            </van-tab>
            <van-tab title="生活用品">
                <product-list :products="daily"></product-list>
            </van-tab>
            <van-tab title="纪念品">
                <product-list :products="souvenir"></product-list>
            </van-tab>
        </van-tabs>
    </div>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <script>
        const { createApp, defineComponent } = Vue;
        
        const ProductList = defineComponent({
            props: ['products'],
            template: `
                <div class="store-grid">
                    <div v-for="product in products" :key="product.id" class="store-item" @click="viewDetail(product.id)">
                        <van-image :src="product.image" fit="cover" class="store-img"></van-image>
                        <div class="store-info">
                            <h4>{{ product.name }}</h4>
                            <p class="store-price"><span class="currency">¥</span>{{ product.price }}</p>
                            <div class="store-tags">
                                <van-tag v-for="tag in product.tags" :key="tag" size="mini" type="primary" plain>{{ tag }}</van-tag>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            methods: {
                viewDetail(id) {
                    location.href = `product-detail.html?id=${id}`;
                }
            }
        });
        
        createApp({
            components: { ProductList },
            data() {
                return {
                    searchValue: '',
                    activeTab: 0,
                    allProducts: [
                        { id: 1, name: "北航纪念卫衣", price: 168, tags: ["热销", "新品"], image: "https://picsum.photos/200/200?random=1" },
                        { id: 2, name: "北航马克杯", price: 58, tags: ["经典"], image: "https://picsum.photos/200/200?random=2" },
                        { id: 3, name: "北航校徽胸针", price: 28, tags: ["精致"], image: "https://picsum.photos/200/200?random=3" },
                        { id: 4, name: "北航帆布包", price: 88, tags: ["实用"], image: "https://picsum.photos/200/200?random=4" },
                        { id: 5, name: "北航纪念T恤", price: 98, tags: ["夏季"], image: "https://picsum.photos/200/200?random=5" },
                        { id: 6, name: "北航笔记本套装", price: 48, tags: ["文具"], image: "https://picsum.photos/200/200?random=6" },
                        { id: 7, name: "北航棒球帽", price: 68, tags: ["配饰"], image: "https://picsum.photos/200/200?random=7" },
                        { id: 8, name: "北航钥匙扣", price: 18, tags: ["小礼品"], image: "https://picsum.photos/200/200?random=8" }
                    ],
                    clothes: [
                        { id: 1, name: "北航纪念卫衣", price: 168, tags: ["热销"], image: "https://picsum.photos/200/200?random=1" },
                        { id: 5, name: "北航纪念T恤", price: 98, tags: ["夏季"], image: "https://picsum.photos/200/200?random=5" },
                        { id: 7, name: "北航棒球帽", price: 68, tags: ["配饰"], image: "https://picsum.photos/200/200?random=7" }
                    ],
                    daily: [
                        { id: 2, name: "北航马克杯", price: 58, tags: ["经典"], image: "https://picsum.photos/200/200?random=2" },
                        { id: 4, name: "北航帆布包", price: 88, tags: ["实用"], image: "https://picsum.photos/200/200?random=4" },
                        { id: 6, name: "北航笔记本套装", price: 48, tags: ["文具"], image: "https://picsum.photos/200/200?random=6" }
                    ],
                    souvenir: [
                        { id: 3, name: "北航校徽胸针", price: 28, tags: ["精致"], image: "https://picsum.photos/200/200?random=3" },
                        { id: 8, name: "北航钥匙扣", price: 18, tags: ["小礼品"], image: "https://picsum.photos/200/200?random=8" }
                    ]
                };
            },
            methods: {
                goBack() {
                    location.href = 'index.html';
                },
                goCart() {
                    vant.Toast('购物车功能开发中');
                }
            }
        }).use(vant).component('ProductList', ProductList).mount('#app');
    </script>
</body>
</html>
