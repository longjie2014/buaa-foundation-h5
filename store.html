<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文创商城 - 北航教育基金会</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@4/lib/index.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/store.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div id="app">
        <van-nav-bar title="文创商城" left-arrow @click-left="goBack" fixed placeholder>
            <template #right>
                <van-icon name="shopping-cart-o" size="20" badge="2" @click="goCart"></van-icon>
            </template>
        </van-nav-bar>
        
        <!-- 搜索栏 -->
        <div class="search-bar" style="margin-top: 46px;">
            <van-search v-model="searchValue" placeholder="搜索文创商品" shape="round" @search="onSearch"></van-search>
        </div>
        
        <!-- 服饰类文创 -->
        <div class="category-title">服饰类文创</div>
        <div class="store-grid">
            <div v-for="product in clothes" :key="product.id" class="store-item" @click="viewProduct(product.id)">
                <img :src="product.image" class="store-img" alt="商品图片">
                <div class="store-info">
                    <h4>{{ product.name }}</h4>
                </div>
            </div>
        </div>
        
        <!-- 日用品类文创 -->
        <div class="category-title">日用品类文创</div>
        <div class="store-grid">
            <div v-for="product in daily" :key="product.id" class="store-item" @click="viewProduct(product.id)">
                <img :src="product.image" class="store-img" alt="商品图片">
                <div class="store-info">
                    <h4>{{ product.name }}</h4>
                </div>
            </div>
        </div>
        
        <!-- 纪念品类文创 -->
        <div class="category-title">纪念品类文创</div>
        <div class="store-grid">
            <div v-for="product in souvenir" :key="product.id" class="store-item" @click="viewProduct(product.id)">
                <img :src="product.image" class="store-img" alt="商品图片">
                <div class="store-info">
                    <h4>{{ product.name }}</h4>
                </div>
            </div>
        </div>

        <!-- 底部 Tabbar -->
        <van-tabbar v-model="activeTabBar" fixed placeholder>
            <van-tabbar-item icon="home-o" @click="goPage('index')">首页</van-tabbar-item>
            <van-tabbar-item icon="shop-o" @click="goPage('store')">文创</van-tabbar-item>
            <van-tabbar-item icon="calendar-o" @click="goPage('activities')">活动</van-tabbar-item>
            <van-tabbar-item icon="user-o" @click="goPage('my')">我的</van-tabbar-item>
        </van-tabbar>
    </div>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    searchValue: '',
                    activeTabBar: 1,
                    clothes: [
                        { id: 1, name: "北航纪念卫衣", image: "https://picsum.photos/200/200?random=1" },
                        { id: 2, name: "北航纪念T恤", image: "https://picsum.photos/200/200?random=2" },
                        { id: 3, name: "北航棒球帽", image: "https://picsum.photos/200/200?random=3" },
                        { id: 4, name: "北航Polo衫", image: "https://picsum.photos/200/200?random=4" },
                        { id: 5, name: "北航防晒衣", image: "https://picsum.photos/200/200?random=5" },
                        { id: 6, name: "北航冲锋衣", image: "https://picsum.photos/200/200?random=6" }
                    ],
                    daily: [
                        { id: 7, name: "北航马克杯", image: "https://picsum.photos/200/200?random=7" },
                        { id: 8, name: "北航帆布包", image: "https://picsum.photos/200/200?random=8" },
                        { id: 9, name: "北航笔记本", image: "https://picsum.photos/200/200?random=9" }
                    ],
                    souvenir: [
                        { id: 10, name: "北航校徽胸针", image: "https://picsum.photos/200/200?random=10" },
                        { id: 11, name: "北航钥匙扣", image: "https://picsum.photos/200/200?random=11" },
                        { id: 12, name: "北航纪念徽章", image: "https://picsum.photos/200/200?random=12" }
                    ]
                };
            },
            methods: {
                goBack() {
                    location.href = 'index.html';
                },
                goCart() {
                    vant.Toast('购物车功能开发中');
                },
                onSearch() {
                    vant.Toast(`搜索: ${this.searchValue}`);
                },
                viewProduct(id) {
                    location.href = `product-detail.html?id=${id}`;
                },
                goPage(page) {
                    const pageMap = {
                        'index': 'index.html',
                        'store': 'store.html',
                        'activities': 'activities.html',
                        'my': 'my.html'
                    };
                    const target = pageMap[page];
                    if (target) {
                        window.location.href = target;
                    }
                }
            }
        }).use(vant).mount('#app');
    </script>
</body>
</html>
