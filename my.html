<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的 - 北航教育基金会</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/npm/vant@4/lib/index.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/my.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div id="app">
        <!-- 用户信息卡片 -->
        <div class="user-header">
            <div class="user-info">
                <van-image round width="80" height="80" src="https://picsum.photos/100/100?random=1" class="avatar"></van-image>
                <div class="user-text">
                    <h2 @click="editProfile">北航校友</h2>
                    <p>2008级 · 计算机学院</p>
                </div>
                <van-icon name="setting-o" class="setting-icon" @click="goSetting"></van-icon>
            </div>
            
            <div class="user-stats">
                <div class="stat-item" @click="goDonations">
                    <span class="stat-num">3</span>
                    <span class="stat-label">我的捐赠</span>
                </div>
                <div class="stat-item" @click="goOrders">
                    <span class="stat-num">5</span>
                    <span class="stat-label">我的订单</span>
                </div>
                <div class="stat-item" @click="goMyActivities">
                    <span class="stat-num">2</span>
                    <span class="stat-label">我的活动</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num">128</span>
                    <span class="stat-label">我的积分</span>
                </div>
            </div>
        </div>
        
        <!-- 我的订单 -->
        <div class="menu-section">
            <van-cell-group>
                <van-cell title="我的订单" icon="orders-o" is-link @click="goOrders">
                    <template #value>
                        <van-tag type="danger">待收货</van-tag>
                    </template>
                </van-cell>
                <van-cell title="捐赠记录" icon="records" is-link @click="goDonations">
                    <template #value>累计捐赠 ¥5,000</template>
                </van-cell>
                <van-cell title="活动报名" icon="calendar-o" is-link @click="goMyActivities"></van-cell>
                <van-cell title="收货地址" icon="location-o" is-link @click="goAddress"></van-cell>
            </van-cell-group>
        </div>
        
        <!-- 服务中心 -->
        <div class="menu-section">
            <van-cell-group title="服务中心">
                <van-cell title="联系客服" icon="service-o" is-link @click="contactService"></van-cell>
                <van-cell title="帮助中心" icon="question-o" is-link @click="goHelp"></van-cell>
                <van-cell title="意见反馈" icon="edit" is-link @click="goFeedback"></van-cell>
                <van-cell title="关于我们" icon="info-o" is-link @click="goAbout"></van-cell>
            </van-cell-group>
        </div>

        <!-- 底部 Tabbar -->
        <van-tabbar v-model="activeTabBar" fixed placeholder>
            <van-tabbar-item icon="home-o" @click="goPage('index')">首页</van-tabbar-item>
            <van-tabbar-item icon="shop-o" @click="goPage('store')">文创</van-tabbar-item>
            <van-tabbar-item icon="calendar-o" @click="goPage('activities')">活动</van-tabbar-item>
            <van-tabbar-item icon="user-o" @click="goPage('my')">我的</van-tabbar-item>
        </van-tabbar>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    activeTabBar: 3
                };
            },
            methods: {
                editProfile() {
                    vant.Toast('编辑个人资料');
                },
                goSetting() {
                    vant.Toast('设置页面');
                },
                goOrders() {
                    location.href = 'orders.html';
                },
                goDonations() {
                    vant.Toast('捐赠记录');
                },
                goMyActivities() {
                    vant.Toast('我的活动');
                },
                goAddress() {
                    vant.Toast('收货地址');
                },
                contactService() {
                    vant.Toast('联系客服');
                },
                goHelp() {
                    vant.Toast('帮助中心');
                },
                goFeedback() {
                    vant.Toast('意见反馈');
                },
                goAbout() {
                    vant.Toast('关于我们');
                },
                goPage(page) {
                    const pageMap = {
                        'index': 'index.html',
                        'store': 'store.html',
                        'activities': 'activities.html',
                        'my': 'my.html'
                    };
                    const target = pageMap[page];
                    if (target) {
                        window.location.href = target;
                    }
                }
            }
        }).use(vant).mount('#app');
    </script>
</body>
</html>
